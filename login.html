<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login Inventario</title>
    <link rel="stylesheet" href="Login.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <!-- LOGIN -->
      <div id="login" class="card">
        <!-- IMAGEN SUPERIOR -->
        <div class="icon-container">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="48"
            height="48"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#1e293b"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>

        <h2>Iniciar Sesión</h2>
        <!-- TÍTULO PRINCIPAL -->

        <input type="text" id="loginUser" placeholder="Usuario" />
        <!-- CAMPO DE USUARIO-->
        <input type="password" id="loginPass" placeholder="Contraseña" />
        <!-- CAMPO DE CONTRASEÑA -->

        <button onclick="login()">Acceder</button>
        <!-- BOTON DE ACCESO -->
        <button class="secondary" onclick="mostrarRegistro()">
          Registrarse
        </button>
        <!-- BOTON DE REGISTRO -->
      </div>

      <!-- REGISTRO -->
      <div id="registro" class="card hidden">
        <h2>Registro</h2>
        <!-- TÍTULO PRINCIPAL -->

        <input type="text" id="nombre" placeholder="Nombre completo" />
        <!-- CAMPO DE NOMBRE -->
        <small class="error" id="errorNombre"></small>
        <!-- MENSAJE DE ERROR PARA NOMBRE -->

        <input
          type="text"
          id="documento"
          placeholder="Documento de identidad"
        />
        <!-- CAMPO DE DOCUMENTO -->
        <small class="error" id="errorDocumento"></small>
        <!-- MENSAJE DE ERROR PARA DOCUMENTO -->

        <input type="text" id="telefono" placeholder="Teléfono" />
        <!-- CAMPO DE TELÉFONO -->
        <small class="error" id="errorTelefono"></small>
        <!-- MENSAJE DE ERROR PARA TELÉFONO -->

        <input type="email" id="correo" placeholder="Correo electrónico" />
        <!-- CAMPO DE CORREO -->
        <small class="error" id="errorCorreo"></small>
        <!-- MENSAJE DE ERROR PARA CORREO -->

        <input type="text" id="regUser" placeholder="Usuario" />
        <!-- CAMPO DE USUARIO PARA REGISTRO -->
        <small class="error" id="errorUser"></small>
        <!-- MENSAJE DE ERROR PARA USUARIO -->

        <input type="password" id="regPass" placeholder="Contraseña" />
        <!-- CAMPO DE CONTRASEÑA PARA REGISTRO -->
        <small class="error" id="errorPass"></small>
        <!-- MENSAJE DE ERROR PARA CONTRASEÑA -->

        <input
          type="password"
          id="confirmPass"
          placeholder="Confirmar contraseña"
        />
        <!-- CAMPO DE CONFIRMAR CONTRASEÑA PARA REGISTRO -->
        <small class="error" id="errorConfirmPass"></small>
        <!-- MENSAJE DE ERROR PARA CONFIRMAR CONTRASEÑA -->

        <button onclick="registrar()">Crear Cuenta</button>
        <!-- BOTON DE CREAR CUENTA -->
        <button class="secondary" onclick="mostrarLogin()">Volver</button>
        <!-- BOTON DE VOLVER AL LOGIN -->
      </div>
    </div>

    <script src="Login.js"></script>
    <!-- ARCHIVO DE JAVASCRIPT -->
  </body>
</html>
